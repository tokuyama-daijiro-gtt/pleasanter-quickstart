services:
  db:
    container_name: postgres
    image: postgres:${POSTGRES_VERSION}
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_HOST_AUTH_METHOD
      - POSTGRES_INITDB_ARGS
    volumes:
      - type: volume
        source: pg_data
        target: ${POSTGRES_VOLUMES_TARGET}

  pleasanter:
    container_name: pleasanter
    build:
      context: ./pleasanter
      dockerfile: ./Pleasanter/Dockerfile
      args:
        - VERSION=${PLEASANTER_VERSION}
    depends_on:
      - db
    ports:
      - '50001:8080'
    environment:
      Implem.Pleasanter_Rds_PostgreSQL_SaConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_SaConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_OwnerConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_OwnerConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_UserConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_UserConnectionString}

  codedefiner:
    container_name: codedefiner
    build:
      context: ./pleasanter
      dockerfile: ./CodeDefiner/Dockerfile
    depends_on:
      - db
    environment:
      Implem.Pleasanter_Rds_PostgreSQL_SaConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_SaConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_OwnerConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_OwnerConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_UserConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_UserConnectionString}

  playwright:
    container_name: playwright
    build:
      context: ./playwright
    depends_on:
      - pleasanter
    volumes:
      - type: bind
        source: ./.devcontainer
        target: /workspace/.devcontainer
    environment:
      TARGET_URL: http://pleasanter:8080
      LOGIN_ID: Administrator
      LOGIN_PASSWORD: pleasanter
      CHANGED_PASSWORD: pleasanter-qs
      API_KEY_FILE: /workspace/.devcontainer/pleasanter-api-key

  ui:
    container_name: ui
    build:
      context: ./ui
    depends_on:
      pleasanter:
        condition: service_started
      playwright:
        condition: service_completed_successfully
    ports:
      - '3000:3000'
    environment:
      NEXT_TELEMETRY_DISABLED: '1'
      PLEASANTER_INTERNAL_URL: http://pleasanter:8080
      PLEASANTER_API_KEY_FILE: /workspace/.devcontainer/pleasanter-api-key
      NEXT_PUBLIC_PLEASANTER_API_BASE_PATH: /pleasanter
    volumes:
      - type: bind
        source: ./ui
        target: /app
      - type: volume
        source: ui_node_modules
        target: /app/node_modules
      - type: bind
        source: ./.devcontainer
        target: /workspace/.devcontainer
        read_only: true

volumes:
  pg_data:
    name: ${COMPOSE_PROJECT_NAME:-default}_pg_data_volume
  ui_node_modules:
    name: ${COMPOSE_PROJECT_NAME:-default}_ui_node_modules_volume
