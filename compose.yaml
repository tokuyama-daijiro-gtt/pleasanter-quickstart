services:
  db:
    container_name: postgres
    image: postgres:${POSTGRES_VERSION}
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_HOST_AUTH_METHOD
      - POSTGRES_INITDB_ARGS
    volumes:
      - type: volume
        source: pg_data
        target: ${POSTGRES_VOLUMES_TARGET}

  pleasanter:
    container_name: pleasanter
    build:
      context: ./pleasanter
      dockerfile: ./Pleasanter/Dockerfile
      args:
        - VERSION=${PLEASANTER_VERSION}
    depends_on:
      - db
    ports:
      - '50001:8080'
    environment:
      Implem.Pleasanter_Rds_PostgreSQL_SaConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_SaConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_OwnerConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_OwnerConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_UserConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_UserConnectionString}

  codedefiner:
    container_name: codedefiner
    build:
      context: ./pleasanter
      dockerfile: ./CodeDefiner/Dockerfile
    depends_on:
      - db
    environment:
      Implem.Pleasanter_Rds_PostgreSQL_SaConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_SaConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_OwnerConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_OwnerConnectionString}
      Implem.Pleasanter_Rds_PostgreSQL_UserConnectionString: ${Implem_Pleasanter_Rds_PostgreSQL_UserConnectionString}

  playwright:
    container_name: playwright
    profiles:
      - tools
    build:
      context: ./playwright
    depends_on:
      pleasanter:
        condition: service_started
    working_dir: /workspace/playwright
    environment:
      PLAYWRIGHT_APP_URL: http://pleasanter:8080
      PLAYWRIGHT_WAIT_FOR_APP: "1"
      PLAYWRIGHT_WAIT_TIMEOUT_MS: "90000"
    volumes:
      - ./playwright:/workspace/playwright
      - playwright_node_modules:/workspace/playwright/node_modules
    entrypoint:
      - /bin/bash
      - /workspace/playwright/docker-entrypoint.sh
    command:
      - npm
      - run
      - help
    stdin_open: true
    tty: true

volumes:
  pg_data:
    name: ${COMPOSE_PROJECT_NAME:-default}_pg_data_volume
  playwright_node_modules:
    name: ${COMPOSE_PROJECT_NAME:-default}_playwright_node_modules_volume
